<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Scale & Sell - Buy & Sell Established Businesses | Trusted Marketplace
    </title>
    <meta
      name="description"
      content="The premier marketplace for buying and selling verified, revenue-generating businesses. Secure escrow, expert support, and transparent processes. Join 10K+ entrepreneurs today."
    />
    <meta name="author" content="Scale & Sell" />

    <meta
      property="og:title"
      content="Scale & Sell - Buy & Sell Established Businesses"
    />
    <meta
      property="og:description"
      content="Connect with verified business buyers and sellers. Secure transactions with built-in escrow services and expert guidance."
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ScaleAndSell" />

    <script>
      // Prevent flash of unstyled content (FOUC) by applying theme before React loads
      (function () {
        const storageKey = "scale-sell-theme";
        const theme =
          localStorage.getItem(storageKey) ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
